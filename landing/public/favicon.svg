<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Key bow (circle with hole) -->
  <circle cx="72" cy="72" r="48" stroke="url(#keyGrad)" stroke-width="8" fill="none" filter="url(#glow)"/>
  <circle cx="72" cy="72" r="18" stroke="url(#keyGrad)" stroke-width="6" fill="none"/>
  <!-- Key shaft -->
  <rect x="110" y="60" width="70" height="24" rx="6" fill="url(#keyGrad)" filter="url(#glow)"/>
  <!-- Key teeth -->
  <rect x="160" y="78" width="10" height="18" rx="2" fill="url(#keyGrad)"/>
  <rect x="144" y="78" width="10" height="14" rx="2" fill="url(#keyGrad)"/>
  <rect x="128" y="78" width="10" height="22" rx="2" fill="url(#keyGrad)"/>
</svg>
