name: landing

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: cd landing && bun install && bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist
      - id: deploy
        uses: actions/deploy-pages@v4
