name: ci

on:
  push:
    branches: [main]
    paths:
      - 'packages/opencode/**'
      - 'packages/core/**'
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/opencode typecheck
