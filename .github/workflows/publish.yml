name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/opencode typecheck

  deploy-landing:
    if: github.ref == 'refs/heads/main'
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: cd landing && bun install && bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist
      - id: deploy
        uses: actions/deploy-pages@v4

  release:
    if: github.ref == 'refs/heads/main'
    needs: [typecheck, deploy-landing]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Release
        run: |
          VERSION=$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "Conclave release $VERSION. Fork of OpenCode with multi-LLM team debates." \
            --target main \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
