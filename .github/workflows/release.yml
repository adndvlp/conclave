name: release

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Native
          - os: ubuntu-latest
            target: bun-linux-x64
            arch: x64
            name: linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            arch: arm64
            name: darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            arch: x64
            name: windows-x64
          # Cross-compile: linux arm64 from x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            arch: arm64
            name: linux-arm64
          # Cross-compile: macos x64 from arm64
          - os: macos-latest
            target: bun-darwin-x64
            arch: x64
            name: darwin-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Build
        run: |
          if [ "${{ matrix.name }}" = "$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')" ]; then
            # Native build — use build script
            bun run packages/opencode/script/build.ts --single --skip-install --skip-embed-web-ui
          else
            # Cross-compile via direct bun build
            bun build packages/opencode/src/index.ts \
              --compile \
              --target=${{ matrix.target }} \
              --outfile=conclave \
              --conditions=browser \
              --minify \
              --external=node-gyp
          fi
        env:
          CONCLAVE_CHANNEL: stable
        shell: bash

      - name: Package
        run: |
          BIN=$(find . packages/opencode/dist -name "conclave" -type f 2>/dev/null | head -1)
          if [ -z "$BIN" ]; then BIN=./conclave; fi
          NAME="conclave-${{ matrix.name }}"
          if echo "${{ matrix.name }}" | grep -q windows; then
            cp "$BIN" "$NAME.exe"
            7z a "$NAME.zip" "$NAME.exe"
            echo "artifact=$NAME.zip" >> $GITHUB_ENV
          else
            cp "$BIN" "$NAME"
            chmod +x "$NAME"
            tar -czf "$NAME.tar.gz" "$NAME"
            echo "artifact=$NAME.tar.gz" >> $GITHUB_ENV
          fi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: conclave-${{ matrix.name }}
          path: ${{ env.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: conclave-*
          merge-multiple: true
          path: dist
      - name: Create Release
        run: |
          VERSION="v$(date +%Y.%m.%d)"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --target main \
            --latest \
            dist/*
        env:
          GH_TOKEN: ${{ github.token }}
