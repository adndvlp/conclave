name: release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Build all platforms
        run: bun run packages/opencode/script/build.ts --skip-embed-web-ui
        env:
          CONCLAVE_CHANNEL: stable

      - name: Package binaries
        run: |
          mkdir -p release
          for dir in packages/opencode/dist/opencode-*/; do
            name=$(basename "$dir" | sed 's/^opencode/conclave/')
            if echo "$name" | grep -q 'windows\|win32'; then
              (cd "$dir/bin" && zip -r "${GITHUB_WORKSPACE}/release/$name.zip" *)
            else
              (cd "$dir/bin" && tar -czf "${GITHUB_WORKSPACE}/release/$name.tar.gz" *)
            fi
          done
          ls -la release/
        shell: bash

      - name: Create Release
        run: |
          VERSION="v$(date +%Y.%m.%d)"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --target main \
            --latest \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}
