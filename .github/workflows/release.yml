name: release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Build all platforms
        run: bun run packages/opencode/script/build.ts --skip-embed-web-ui
        env:
          CONCLAVE_CHANNEL: stable

      - name: Create Release
        run: |
          VERSION="v$(date +%Y.%m.%d)"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --target main \
            --latest \
            packages/opencode/dist/*.tar.gz \
            packages/opencode/dist/*.zip
        env:
          GH_TOKEN: ${{ github.token }}
