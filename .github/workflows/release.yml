name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Bump version
        id: version
        run: |
          # Read current version from root package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current: $CURRENT"

          # Parse and bump
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ inputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumped: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Update root package.json
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update packages/opencode/package.json
          node -e "
            const pkg = require('./packages/opencode/package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('./packages/opencode/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Commit version bump
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package.json packages/opencode/package.json
          git commit -m "chore: bump version to $VERSION" || true
          git push origin main

      - name: Build all platforms
        run: bun run packages/opencode/script/build.ts --skip-embed-web-ui
        env:
          CONCLAVE_CHANNEL: stable

      - name: Package binaries
        run: |
          mkdir -p release
          for dir in packages/opencode/dist/opencode-*/; do
            name=$(basename "$dir" | sed 's/^opencode/conclave/')
            if echo "$name" | grep -q 'windows\|win32'; then
              (cd "$dir/bin" && zip -r "${GITHUB_WORKSPACE}/release/$name.zip" *)
            else
              (cd "$dir/bin" && tar -czf "${GITHUB_WORKSPACE}/release/$name.tar.gz" *)
            fi
          done
          ls -la release/
        shell: bash

      - name: Create Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --target main \
            --latest \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}
