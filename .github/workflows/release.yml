name: release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Release
        run: |
          gh release create "v$(date +%Y.%m.%d)" \
            --title "v$(date +%Y.%m.%d)" \
            --generate-notes \
            --target main \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
